name: Update schools JSON

on:
  schedule:
    - cron: '0 0 * * 1'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run updater
        run: |
          python scripts/update_schools.py \
  --input data/schools-v2_2026-05-07_no1-20_updated.json \
  --output data/schools-v2_2026-05-07_no1-20_updated.json \
  --pretty

      - name: Commit and push if changed
        run: |
          if git diff --quiet; then
            echo "No changes"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/schools-v2_2026-05-07_no1-20_updated.json
          git commit -m "Update schools JSON"
          git push
